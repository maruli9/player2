<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Player</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050b1a;
    color:white;
    text-align:center;
}

#box{
    width:100%;
    max-width:none;
    padding:50px;
    box-sizing:border-box;
    
    
}

/* NOW PLAYING */
#now{
    font-size:18px;
    margin:10px 0;
    color:#4da3ff;
}

/* PROGRESS */
#progressWrap{
    width:100%;
    height:6px;
    background:#1a2a44;
    border-radius:10px;
    overflow:hidden;
    margin:10px 0;
}

#progress{
    height:100%;
    width:0%;
    background:#4da3ff;
}

/* TIME */
#time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    opacity:0.8;
}

/* BUTTONS */
.row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    flex:1;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#1e3a66;
    color:white;
}

/* TRACKS */
.track{
    background:#111a33;
    margin:6px;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}

.active{
    border-left:4px solid #4da3ff;
}

/* HIDE DEFAULT AUDIO */
audio{
    display:none;
}
</style>
</head>

<body>

<h2>MARULIEGO PLAYER</h2>

<div id="box">

    <div id="now">Brak utworu</div>

    <audio id="audio"></audio>

    <div id="progressWrap" onclick="seek(event)">
        <div id="progress"></div>
    </div>

    <div id="time">
        <span id="cur">0:00</span>
        <span id="dur">0:00</span>
    </div>

    <div class="row">
        <button onclick="prev()">⏮</button>
        <button onclick="togglePlay()">▶</button>
        <button onclick="next()">⏭</button>
    </div>

    <div id="list"></div>

</div>

<script>

/* 🔥 TWOJE PLIKI */
const tracks = [
    { name: "Song 1", url: "song1.wav" },
    { name: "Song 2", url: "song2.wav" },
    { name: "dire straits news", url: "news dire straits.mp3" },
    { name: "Jay Aliyev Still Here", url: "Jay Aliyev Still Here.wav" },
    { name: "genesis tonight tonight", url: "genesis tonight tonight.mp3" },
    { name: "emerson lake and palmer", url: "emerson lake and palmer.mp3" }
];




let current = 0;

const audio = document.getElementById("audio");
const now = document.getElementById("now");
const progress = document.getElementById("progress");
const cur = document.getElementById("cur");
const dur = document.getElementById("dur");

/* PLAY */
function play(i){
    current = i;
    audio.src = tracks[i].url;
    audio.play();
    now.innerText = "▶ " + tracks[i].name;
    render();
}

/* PLAY/PAUSE */
function togglePlay(){
    if(audio.paused) audio.play();
    else audio.pause();
}

/* NEXT (NO LOOP) */
function next(){
    if(current < tracks.length - 1){
        play(current + 1);
    }
}

/* PREV */
function prev(){
    if(current > 0){
        play(current - 1);
    }
}

/* UPDATE PROGRESS */
audio.addEventListener("timeupdate", ()=>{
    if(!audio.duration) return;

    let p = (audio.currentTime / audio.duration) * 100;
    progress.style.width = p + "%";

    cur.innerText = fmt(audio.currentTime);
    dur.innerText = fmt(audio.duration);
});

/* SEEK */
function seek(e){
    let rect = e.currentTarget.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let percent = x / rect.width;

    audio.currentTime = percent * audio.duration;
}

/* FORMAT TIME */
function fmt(t){
    let m = Math.floor(t/60);
    let s = Math.floor(t%60);
    return m + ":" + (s<10?"0"+s:s);
}

/* END = STOP */
audio.onended = ()=>{
    audio.pause();
};

/* RENDER LIST */
function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    tracks.forEach((t,i)=>{
        const div = document.createElement("div");
        div.className = "track";
        div.innerText = t.name;

        if(i === current) div.classList.add("active");

        div.onclick = ()=>play(i);

        list.appendChild(div);
    });
}

render();

</script>

</body>
</html>
